<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday, Musa</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
:root{
  --warm:#f5e8cc;
  --gold:#e8c97a;
  --gold2:#c49a3c;
  --muted:rgba(245,232,204,0.58);
  --card-bg:rgba(255,248,235,0.042);
  --card-border:rgba(232,201,122,0.13);
}
*{ margin:0; padding:0; box-sizing:border-box; }

body{
  background:#07080e;
  height:100vh;
  overflow:hidden;
  font-family:'Josefin Sans',sans-serif;
  color:var(--warm);
}

/* ── living canvas bg ───────────────────────── */
#bgCanvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* ── grain ──────────────────────────────────── */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
  opacity:0.5;
  z-index:1;
  pointer-events:none;
  animation:grain 0.4s steps(2) infinite;
}
@keyframes grain{
  0%{ transform:translate(0,0) }
  25%{ transform:translate(-2px,1px) }
  50%{ transform:translate(1px,-2px) }
  75%{ transform:translate(-1px,2px) }
  100%{ transform:translate(2px,-1px) }
}

/* ── scene shell ────────────────────────────── */
#scene{
  position:fixed;
  inset:0;
  z-index:3;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
}

/* ── card ───────────────────────────────────── */
.card{
  width:min(680px,96vw);
  text-align:center;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:8px;
  padding:52px 56px 48px;
  position:relative;
  backdrop-filter:blur(20px);
  box-shadow:0 40px 100px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,248,235,0.07);
}
.card-line{
  position:absolute;
  top:0; left:10%; right:10%;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent);
  border-radius:8px;
}
.card-line-bot{
  position:absolute;
  bottom:0; left:20%; right:20%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(196,154,60,0.4),transparent);
}

/* ── illustration ───────────────────────────── */
.illus{
  display:flex;
  justify-content:center;
  margin-bottom:26px;
  min-height:80px;
}

/* ── type ───────────────────────────────────── */
.scene-tag{
  font-size:0.58rem;
  letter-spacing:5px;
  color:var(--gold2);
  text-transform:uppercase;
  margin-bottom:18px;
  opacity:0; transform:translateY(6px);
  transition:opacity .7s ease .08s, transform .7s ease .08s;
}
.scene-head{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.9rem,4.2vw,3rem);
  font-weight:300;
  letter-spacing:1px;
  line-height:1.2;
  margin-bottom:20px;
  color:var(--warm);
  opacity:0; transform:translateY(14px);
  transition:opacity .9s ease .26s, transform .9s ease .26s;
}
.scene-head em{ font-style:italic; color:var(--gold); }
.scene-body{
  font-family:'Cormorant Garamond',serif;
  font-size:1.1rem;
  font-weight:300;
  line-height:2;
  color:var(--muted);
  max-width:480px;
  margin:0 auto 32px;
  opacity:0; transform:translateY(8px);
  transition:opacity .85s ease .44s, transform .85s ease .44s;
}
.scene-btn{
  display:inline-block;
  padding:10px 28px;
  border:1px solid rgba(232,201,122,0.25);
  border-radius:2px;
  background:transparent;
  color:rgba(232,201,122,0.72);
  font-family:'Josefin Sans',sans-serif;
  font-size:0.6rem;
  letter-spacing:4px;
  text-transform:uppercase;
  cursor:pointer;
  opacity:0; transform:translateY(6px);
  transition:opacity .7s ease .6s, transform .7s ease .6s,
             background .3s, border-color .3s, color .3s;
}
.scene-btn:hover{
  background:rgba(232,201,122,0.08);
  border-color:rgba(232,201,122,0.5);
  color:var(--gold);
}

/* active reveal */
.revealed .scene-tag,
.revealed .scene-head,
.revealed .scene-body,
.revealed .scene-btn{ opacity:1; transform:translateY(0); }

/* ── progress dots ──────────────────────────── */
#prog{
  position:fixed;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:7px;
  z-index:10;
}
.dot{
  width:4px; height:4px; border-radius:50%;
  background:rgba(232,201,122,0.15);
  transition:all .4s ease;
}
.dot.on{ background:rgba(232,201,122,0.85); transform:scale(1.5); }
.dot.past{ background:rgba(232,201,122,0.32); }

/* ── flash ──────────────────────────────────── */
#flash{
  position:fixed; inset:0;
  background:rgba(255,245,220,1);
  opacity:0; pointer-events:none; z-index:50;
  transition:opacity .08s;
}

/* ── SVG animations ─────────────────────────── */
@keyframes flicker{
  0%,100%{ transform:scaleX(1) scaleY(1) translateY(0); }
  20%{ transform:scaleX(.87) scaleY(1.09) translateY(-1.5px); }
  40%{ transform:scaleX(1.06) scaleY(.94) translateY(1px); }
  70%{ transform:scaleX(.92) scaleY(1.06) translateY(-1px); }
}
.flame{ transform-origin:center bottom; animation:flicker 1.35s ease-in-out infinite; }
.flame2{ animation-duration:1.05s; animation-delay:.25s; }
.flame3{ animation-duration:1.6s; animation-delay:.55s; }
.flame4{ animation-duration:1.2s; animation-delay:.9s; }
.flame5{ animation-duration:1.45s; animation-delay:.15s; }

@keyframes petalSpin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}
@keyframes petalSpinR{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(-360deg); }
}
.petals-a{ transform-origin:50px 50px; animation:petalSpin 20s linear infinite; }
.petals-b{ transform-origin:50px 50px; animation:petalSpinR 25s linear infinite; }

@keyframes twinkle{
  0%,100%{ opacity:.12; }
  50%{ opacity:1; }
}
@keyframes float{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-6px); }
}
@keyframes heartbeat{
  0%,100%{ transform:scale(1); }
  15%{ transform:scale(1.08); }
  30%{ transform:scale(1); }
  45%{ transform:scale(1.04); }
}
@keyframes leafSway{
  0%,100%{ transform:rotate(-5deg); }
  50%{ transform:rotate(5deg); }
}
@keyframes drift{
  0%{ transform:translate(0,0) rotate(0deg); opacity:0; }
  10%{ opacity:.8; }
  100%{ transform:translate(var(--dx),var(--dy)) rotate(var(--dr)); opacity:0; }
}
@keyframes moonGlow{
  0%,100%{ opacity:.85; }
  50%{ opacity:1; }
}
@keyframes cloudDrift{
  0%{ transform:translateX(0); }
  100%{ transform:translateX(30px); }
}
@keyframes ripple{
  0%{ r:4; opacity:.7; }
  100%{ r:28; opacity:0; }
}
@keyframes shoot{
  0%{ stroke-dashoffset:200; opacity:1; }
  100%{ stroke-dashoffset:0; opacity:0; }
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="flash"></div>

<div id="scene">
  <div class="card" id="card">
    <div class="card-line"></div>
    <div class="card-line-bot"></div>
  </div>
</div>

<div id="prog"></div>

<script>
/* ════════════════════════════════════════════
   SCENES
════════════════════════════════════════════ */
const scenes = [

  /* 0 — opening */
  {
    tag:"Today",
    head:"Happy Birthday,<br><em>Musa.</em>",
    body:"Ya Allah, bless Musa with happiness he can feel in his chest, peace he doesn't have to search for, and love that finds him without him having to ask.",
    btn:"Open",
    illus:"candles",
    bg:"golden"
  },

  /* 1 — morning wish */
  {
    tag:"A small wish",
    head:"May your mornings\nfeel like <em>a gift.</em>",
    body:"May Allah fill your mornings with noor, your days with barakah, and your nights with peace, comfort, and contentment throughout the year.",
    btn:"Keep going",
    illus:"sunrise",
    bg:"sunrise"
  },

  /* 2 — sunflower */
  {
    tag:"For the light you carry",
    head:"You make things\n<em>brighter,</em> you know.",
    body:"May Allah turn every struggle you've faced into something beautiful, and every sincere effort into blessings beyond your expectations. Nothing you've carried for His sake has ever gone unseen.",
    btn:"Continue",
    illus:"sunflower",
    bg:"meadow"
  },

  /* 3 — night sky */
  {
    tag:"On nights like this",
    head:"The sky is\n<em>celebrating too.</em>",
    body:"On a night full of stars, may every dua made for you reach the sky and come back as answered prayers.",
    btn:"One more",
    illus:"stars",
    bg:"night"
  },

  /* 4 — quiet courage */
  {
    tag:"A gentle reminder",
    head:"Your dreams\ndeserve a <em>real chance.</em>",
    body:"Ya Allah — open the doors for him that he's been standing in front of, quietly, with hope and patience. Ameen.",
    btn:"Almost there",
    illus:"lantern",
    bg:"dusk"
  },

  /* 5 — friendship */
  {
    tag:"Something true",
    head:"You are\n<em>well loved.</em>",
    body:"May Allah bless you with people who see the beauty of your soul, appreciate your heart, and stand by you with sincerity, and may He always be nearer to you than anyone else.",
    btn:"One last thing",
    illus:"heart",
    bg:"rose"
  },

  /* 6 — flowers */
  {
    tag:"Like sunflowers",
    head:"Keep turning\ntoward the <em>light.</em>",
    body:"Even when it's been a heavy week, or a heavy month. Even when you can't quite see it yet. It's there. And so are you.",
    btn:"Nearly",
    illus:"garden",
    bg:"bloom"
  },

  /* 7 — candles and cake */
  {
    tag:"Make a wish",
    head:"Close your eyes.\n<em>Blow.</em>",
    body:"Whatever your heart has been quietly praying for, may Allah bring it to you in the most beautiful way and at the perfect time.",
    btn:"Last one",
    illus:"cake",
    bg:"golden"
  },

  /* 8 — final */
  {
    tag:"With love",
    head:"<em>Happy Birthday,</em>\nMusa.",
    body:"May this year hold more than you expected.\nMay it be full, and warm, and yours.\n\n— H.",
    btn:null,
    illus:"finale",
    bg:"finale",
    final:true
  }
];

let step = 0;

/* ════════════════════════════════════════════
   LIVING BACKGROUND ENGINE
════════════════════════════════════════════ */
const cv = document.getElementById("bgCanvas");
const cx = cv.getContext("2d");
let W, H;
let particles = [];
let bgMode = "golden";
let bgTransition = 0; // 0-1
let prevBg = "golden";
let tAnim = 0;

function resize(){
  W = cv.width = innerWidth;
  H = cv.height = innerHeight;
  initParticles();
}

/* ── particle systems per bg ─────────────────── */
function initParticles(){
  particles = [];
  const mode = bgMode;
  if(mode==="golden"){
    for(let i=0;i<90;i++) particles.push(makeGoldenDust());
  } else if(mode==="sunrise"){
    for(let i=0;i<60;i++) particles.push(makeSunMote());
  } else if(mode==="meadow"){
    for(let i=0;i<50;i++) particles.push(makePetal());
  } else if(mode==="night"){
    for(let i=0;i<140;i++) particles.push(makeStar());
  } else if(mode==="dusk"){
    for(let i=0;i<70;i++) particles.push(makeLanternSpark());
  } else if(mode==="rose"){
    for(let i=0;i<55;i++) particles.push(makeRosePetal());
  } else if(mode==="bloom"){
    for(let i=0;i<80;i++) particles.push(makeBloomPetal());
  } else if(mode==="finale"){
    for(let i=0;i<100;i++) particles.push(makeConfetti());
  }
}

function makeGoldenDust(){
  return{ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.2+.3, vx:(Math.random()-.5)*.2, vy:-Math.random()*.35-.05, a:Math.random()*.6+.1, life:0, maxLife:300+Math.random()*300, type:"gdust" };
}
function makeSunMote(){
  return{ x:Math.random()*W, y:H*0.5+Math.random()*H*0.5, r:Math.random()*1.8+.4, vx:(Math.random()-.5)*.15, vy:-Math.random()*.5-.1, a:Math.random()*.5+.15, life:0, maxLife:200+Math.random()*250, type:"mote" };
}
function makePetal(){
  return{ x:Math.random()*W, y:-20, r:4+Math.random()*5, vx:(Math.random()-.5)*.6, vy:Math.random()*.8+.3, rot:Math.random()*Math.PI*2, drot:(Math.random()-.5)*.04, a:.7+Math.random()*.3, life:0, maxLife:H/(0.3+Math.random()*.7)*2, type:"petal" };
}
function makeStar(){
  return{ x:Math.random()*W, y:Math.random()*H*.75, r:Math.random()*.9+.2, phase:Math.random()*Math.PI*2, speed:Math.random()*.008+.002, a:.8, type:"star" };
}
function makeLanternSpark(){
  const ox = W*.5+(Math.random()-.5)*W*.8;
  return{ x:ox, y:H+20, r:Math.random()*2+1, vx:(Math.random()-.5)*.3, vy:-Math.random()*.7-.3, a:.7+Math.random()*.3, life:0, maxLife:180+Math.random()*200, type:"lspark" };
}
function makeRosePetal(){
  return{ x:Math.random()*W, y:-20, r:5+Math.random()*6, vx:(Math.random()-.5)*.5, vy:Math.random()*.6+.25, rot:Math.random()*Math.PI*2, drot:(Math.random()-.5)*.035, a:.6+Math.random()*.35, life:0, maxLife:H/(0.25+Math.random()*.5)*2, type:"rpetal" };
}
function makeBloomPetal(){
  return{ x:Math.random()*W, y:-20, r:4+Math.random()*7, vx:(Math.random()-.5)*.7, vy:Math.random()*.7+.2, rot:Math.random()*Math.PI*2, drot:(Math.random()-.5)*.05, a:.65+Math.random()*.35, life:0, maxLife:H/(0.3+Math.random()*.6)*2, type:"bpetal" };
}
function makeConfetti(){
  const colors=["#e8c97a","#c49a3c","#f5e8cc","#d4b060","#ffffff","#f0c090","#e07060"];
  return{ x:Math.random()*W, y:-20, w:5+Math.random()*7, h:3+Math.random()*4, vx:(Math.random()-.5)*1.2, vy:Math.random()*1.4+.4, rot:Math.random()*Math.PI*2, drot:(Math.random()-.5)*.12, color:colors[Math.floor(Math.random()*colors.length)], a:.8+Math.random()*.2, life:0, maxLife:H/(0.4+Math.random()*.7)*2, type:"confetti" };
}

/* ── main draw ─────────────────────────────── */
function drawBg(t){
  tAnim = t;
  cx.clearRect(0,0,W,H);
  drawBgLayer(bgMode, 1, t);
  updateParticles(t);
  requestAnimationFrame(drawBg);
}

function drawBgLayer(mode, alpha, t){
  cx.save();
  cx.globalAlpha = alpha;

  if(mode==="golden"){
    /* deep amber-gold gradient, soft moving orbs */
    const g = cx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.5,W*.8);
    g.addColorStop(0,"rgba(60,38,8,0.85)");
    g.addColorStop(.5,"rgba(25,15,5,0.9)");
    g.addColorStop(1,"rgba(7,8,14,1)");
    cx.fillStyle=g; cx.fillRect(0,0,W,H);

    /* warm orbs */
    const ox1 = W*.3+Math.sin(t*.0003)*W*.1;
    const oy1 = H*.35+Math.cos(t*.0004)*H*.07;
    const o1 = cx.createRadialGradient(ox1,oy1,0,ox1,oy1,W*.35);
    o1.addColorStop(0,"rgba(200,140,40,0.22)");
    o1.addColorStop(1,"transparent");
    cx.fillStyle=o1; cx.fillRect(0,0,W,H);

    const ox2 = W*.72+Math.cos(t*.00035)*W*.08;
    const oy2 = H*.6+Math.sin(t*.00028)*H*.08;
    const o2 = cx.createRadialGradient(ox2,oy2,0,ox2,oy2,W*.3);
    o2.addColorStop(0,"rgba(180,110,20,0.18)");
    o2.addColorStop(1,"transparent");
    cx.fillStyle=o2; cx.fillRect(0,0,W,H);

  } else if(mode==="sunrise"){
    const g = cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"rgba(10,12,30,1)");
    g.addColorStop(.35,"rgba(80,30,10,0.9)");
    g.addColorStop(.65,"rgba(200,90,20,0.5)");
    g.addColorStop(1,"rgba(240,160,60,0.3)");
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
    /* sun glow */
    const sy = H*.62+Math.sin(t*.0002)*H*.02;
    const sg = cx.createRadialGradient(W*.5,sy,0,W*.5,sy,W*.5);
    sg.addColorStop(0,"rgba(255,200,80,0.35)");
    sg.addColorStop(.3,"rgba(220,120,30,0.2)");
    sg.addColorStop(1,"transparent");
    cx.fillStyle=sg; cx.fillRect(0,0,W,H);

  } else if(mode==="meadow"){
    const g = cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"rgba(8,10,20,1)");
    g.addColorStop(.4,"rgba(20,35,15,0.95)");
    g.addColorStop(1,"rgba(15,30,10,1)");
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
    /* green glow */
    const gg = cx.createRadialGradient(W*.4,H*.6,0,W*.4,H*.6,W*.5);
    gg.addColorStop(0,"rgba(60,120,30,0.14)");
    gg.addColorStop(1,"transparent");
    cx.fillStyle=gg; cx.fillRect(0,0,W,H);
    /* yellow glow */
    const yg = cx.createRadialGradient(W*.65,H*.4,0,W*.65,H*.4,W*.4);
    yg.addColorStop(0,"rgba(200,170,30,0.1)");
    yg.addColorStop(1,"transparent");
    cx.fillStyle=yg; cx.fillRect(0,0,W,H);

  } else if(mode==="night"){
    const g = cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"rgba(2,3,18,1)");
    g.addColorStop(.5,"rgba(5,6,30,1)");
    g.addColorStop(1,"rgba(8,10,22,1)");
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
    /* moon glow */
    const mx = W*.75+Math.sin(t*.00015)*W*.04;
    const my = H*.18+Math.cos(t*.00012)*H*.03;
    const mg = cx.createRadialGradient(mx,my,0,mx,my,W*.3);
    mg.addColorStop(0,"rgba(200,210,240,0.18)");
    mg.addColorStop(1,"transparent");
    cx.fillStyle=mg; cx.fillRect(0,0,W,H);
    /* nebula */
    const ng = cx.createRadialGradient(W*.25,H*.4,0,W*.25,H*.4,W*.45);
    ng.addColorStop(0,"rgba(80,60,160,0.08)");
    ng.addColorStop(1,"transparent");
    cx.fillStyle=ng; cx.fillRect(0,0,W,H);

  } else if(mode==="dusk"){
    const g = cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"rgba(10,5,20,1)");
    g.addColorStop(.4,"rgba(50,20,10,0.95)");
    g.addColorStop(.8,"rgba(120,60,20,0.5)");
    g.addColorStop(1,"rgba(180,100,30,0.3)");
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
    const dg = cx.createRadialGradient(W*.5,H*.8,0,W*.5,H*.8,W*.6);
    dg.addColorStop(0,"rgba(220,140,40,0.2)");
    dg.addColorStop(1,"transparent");
    cx.fillStyle=dg; cx.fillRect(0,0,W,H);

  } else if(mode==="rose"){
    const g = cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"rgba(15,5,10,1)");
    g.addColorStop(.5,"rgba(40,10,20,0.95)");
    g.addColorStop(1,"rgba(10,5,12,1)");
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
    const rg = cx.createRadialGradient(W*.5,H*.45,0,W*.5,H*.45,W*.5);
    rg.addColorStop(0,"rgba(200,60,80,0.14)");
    rg.addColorStop(.5,"rgba(120,30,50,0.08)");
    rg.addColorStop(1,"transparent");
    cx.fillStyle=rg; cx.fillRect(0,0,W,H);

  } else if(mode==="bloom"){
    const g = cx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"rgba(8,5,15,1)");
    g.addColorStop(.5,"rgba(25,15,30,1)");
    g.addColorStop(1,"rgba(10,8,20,1)");
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
    const pg = cx.createRadialGradient(W*.4,H*.5,0,W*.4,H*.5,W*.55);
    pg.addColorStop(0,"rgba(180,80,160,0.1)");
    pg.addColorStop(1,"transparent");
    cx.fillStyle=pg; cx.fillRect(0,0,W,H);
    const pg2 = cx.createRadialGradient(W*.65,H*.35,0,W*.65,H*.35,W*.4);
    pg2.addColorStop(0,"rgba(240,180,40,0.09)");
    pg2.addColorStop(1,"transparent");
    cx.fillStyle=pg2; cx.fillRect(0,0,W,H);

  } else if(mode==="finale"){
    const g = cx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.5,W*.9);
    g.addColorStop(0,"rgba(50,32,8,0.95)");
    g.addColorStop(.5,"rgba(20,12,4,0.98)");
    g.addColorStop(1,"rgba(7,8,14,1)");
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
    const fg = cx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.5);
    fg.addColorStop(0,"rgba(230,201,122,0.18)");
    fg.addColorStop(1,"transparent");
    cx.fillStyle=fg; cx.fillRect(0,0,W,H);
  }

  cx.restore();
}

/* ── particles update/draw ───────────────────── */
function updateParticles(t){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    const type=p.type;

    if(type==="gdust"||type==="mote"||type==="lspark"){
      p.x+=p.vx; p.y+=p.vy; p.life++;
      const fade=Math.sin(p.life/p.maxLife*Math.PI);
      cx.beginPath();
      cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      const col = type==="lspark" ? `rgba(255,200,80,${p.a*fade})` :
                  type==="mote"   ? `rgba(255,220,150,${p.a*fade})` :
                                    `rgba(232,201,122,${p.a*fade*.7})`;
      cx.fillStyle=col; cx.fill();
      if(p.life>=p.maxLife) particles[i] = type==="gdust"?makeGoldenDust():type==="mote"?makeSunMote():makeLanternSpark();
    }
    else if(type==="star"){
      const a=0.08+0.65*Math.sin(t*p.speed+p.phase);
      cx.beginPath();
      cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      cx.fillStyle=`rgba(230,220,180,${a})`;
      cx.fill();
      /* inner bright */
      cx.beginPath();
      cx.arc(p.x,p.y,p.r*.45,0,Math.PI*2);
      cx.fillStyle=`rgba(255,250,230,${a*0.9})`;
      cx.fill();
    }
    else if(type==="petal"||type==="rpetal"||type==="bpetal"){
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.drot; p.life++;
      cx.save();
      cx.translate(p.x,p.y);
      cx.rotate(p.rot);
      cx.globalAlpha=p.a*(1-Math.min(p.life/p.maxLife*2,1)*.3);
      cx.beginPath();
      if(type==="petal"){
        cx.ellipse(0,0,p.r*.6,p.r,0,0,Math.PI*2);
        cx.fillStyle="rgba(240,180,40,0.75)";
      } else if(type==="rpetal"){
        cx.ellipse(0,0,p.r*.55,p.r,0,0,Math.PI*2);
        cx.fillStyle="rgba(220,80,100,0.65)";
      } else {
        cx.ellipse(0,0,p.r*.5,p.r,0,0,Math.PI*2);
        const hues=["rgba(220,80,180,0.6)","rgba(240,180,40,0.6)","rgba(180,100,220,0.6)"];
        cx.fillStyle=hues[Math.floor(p.r)%3];
      }
      cx.fill();
      cx.restore();
      cx.globalAlpha=1;
      if(p.y>H+30) particles[i] = type==="petal"?makePetal():type==="rpetal"?makeRosePetal():makeBloomPetal();
    }
    else if(type==="confetti"){
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.drot; p.life++;
      cx.save();
      cx.translate(p.x,p.y);
      cx.rotate(p.rot);
      cx.globalAlpha=p.a;
      cx.fillStyle=p.color;
      cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cx.restore();
      cx.globalAlpha=1;
      if(p.y>H+20) particles[i]=makeConfetti();
    }
  }
}

const illustFns = { candles:svgCandles, sunrise:svgSunrise, sunflower:svgSunflower, stars:svgStars, lantern:svgLantern, heart:svgHeart, garden:svgGarden, cake:svgCake, finale:svgFinale };

/* ════════════════════════════════════════════
   RENDER
════════════════════════════════════════════ */
function render(){
  const s = scenes[step];
  const card = document.getElementById("card");
  card.classList.remove("revealed");

  /* update bg */
  bgMode = s.bg;
  initParticles();

  const bodyHtml = s.body.replace(/\n/g,"<br>");
  card.innerHTML = `
    <div class="card-line"></div>
    <div class="card-line-bot"></div>
    <div class="illus">${illustFns[s.illus]()}</div>
    <div class="scene-tag">${s.tag}</div>
    <div class="scene-head">${s.head}</div>
    <div class="scene-body">${bodyHtml}</div>
    ${s.btn ? `<button class="scene-btn" onclick="advance()">${s.btn} →</button>` : ""}
  `;

  /* progress */
  const prog = document.getElementById("prog");
  prog.innerHTML = scenes.map((_,i)=>
    `<div class="dot ${i===step?"on":i<step?"past":""}"></div>`
  ).join("");

  requestAnimationFrame(()=>requestAnimationFrame(()=> card.classList.add("revealed")));
}

/* ════════════════════════════════════════════
   ADVANCE
════════════════════════════════════════════ */
function advance(){
  if(step >= scenes.length-1) return;
  const f = document.getElementById("flash");
  f.style.opacity = "0.055";
  setTimeout(()=> f.style.opacity="0", 100);
  step++;
  render();
}

document.addEventListener("keydown",e=>{
  if(["Enter"," ","ArrowRight"].includes(e.key)) advance();
});

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
resize();
window.addEventListener("resize",resize);
requestAnimationFrame(drawBg);
render();
</script>
